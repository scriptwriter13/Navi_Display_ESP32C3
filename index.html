<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeNav_C3 Web Uploader</title>
    <script src="https://unpkg.com/esptool-js@0.1.0/bundle.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; line-height: 1.6; background: #f9f9f9; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: white; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        #log { background: #222; color: #0f0; padding: 15px; text-align: left; height: 200px; overflow-y: scroll; font-family: monospace; font-size: 12px; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BikeNav_C3 Firmware Uploader</h1>
        <p>1. Firmware-Datei (.bin) auswählen:</p>
        <input type="file" id="fileInput">
        <br>
        <button type="button" id="connectBtn">Verbinden & Flashen</button>
        
        <div id="log">Bereit...</div>
    </div>

    <script>
        const log = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        const fileInput = document.getElementById('fileInput');

        function logger(text) { 
            const div = document.createElement('div');
            div.textContent = "> " + text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight; 
        }

        connectBtn.addEventListener('click', async () => {
            if (!fileInput.files[0]) { logger("Fehler: Bitte erst eine .bin Datei wählen."); return; }
            
            connectBtn.disabled = true;
            log.innerHTML = ""; // Log leeren
            
            try {
                const transport = await navigator.serial.requestPort();
                await transport.open({ baudRate: 115200 });
                
                const esptool = new esptooljs.ESPLoader(transport, 115200, logger);
                
                logger("Verbindung wird hergestellt...");
                // WICHTIG: main() führt den Handshake durch
                await esptool.main();
                
                logger("Handshake erfolgreich. Starte Flash-Vorgang...");
                const fileReader = new FileReader();
                fileReader.onload = async (e) => {
                    const binary = e.target.result;
                    await esptool.writeFlash({
                        file: binary,
                        flashAddr: 0x00000
                    });
                    logger("Flash erfolgreich abgeschlossen!");
                    connectBtn.disabled = false;
                };
                fileReader.readAsArrayBuffer(fileInput.files[0]);
                
            } catch (err) {
                logger("Fehler: " + err.message);
                connectBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
